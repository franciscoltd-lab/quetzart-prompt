<ion-content>
  <main class="artwork-detail">
    <ion-button class="detail-close" fill="clear" (click)="dismiss()" aria-label="Cerrar">
      <ion-icon name="close-outline" slot="icon-only"></ion-icon>
    </ion-button>

    <button type="button" class="detail-image" (click)="toggleZoom($event)" [class.zoomed]="imageZoomed">
      <img [src]="artwork?.image_url" [alt]="artwork?.title || 'Obra'" />
      <span>
        <ion-icon name="expand-outline"></ion-icon>
      </span>
    </button>

    <section class="detail-info">
      <div>
        <p class="detail-kicker">{{ artwork?.artist || 'Quetzart' }}</p>
        <h1>{{ artwork?.title || 'Obra' }}</h1>
      </div>

      <p class="detail-description">
        {{ artwork?.description || 'Pieza disponible dentro de Quetzart.' }}
      </p>

      <dl class="detail-meta">
        <div>
          <dt>Tecnica</dt>
          <dd>{{ artwork?.technique || artwork?.artist || 'Tecnica mixta' }}</dd>
        </div>
        <div>
          <dt>Anio</dt>
          <dd>{{ artwork?.year || '2026' }}</dd>
        </div>
      </dl>

      <ion-button expand="block" fill="outline" class="favorite-btn">
        Anadir a Favoritos
      </ion-button>

      <ion-button expand="block" class="buy-btn" (click)="openBankInfo()">
        Comprar
      </ion-button>
    </section>
  </main>
</ion-content>
