<ion-header class="qz-header">
  <ion-toolbar class="qz-header">
    <ion-title>Crear cuenta</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="qz-bg">
    <div class="split">
      <button class="half artist" (click)="select('artist')">
        <div class="label">
          <strong>ARTISTA</strong>
          <small>Comparte obra, portafolio y eventos.</small>
        </div>
      </button>

      <button class="half est" (click)="select('establishment')">
        <div class="label">
          <strong>ESTABLECIMIENTO</strong>
          <small>Publica tu espacio y conecta con artistas.</small>
        </div>
      </button>

      <button class="half viewer" (click)="select('viewer')">
        <div class="label">
          <strong>ESPECTADOR</strong>
          <small>Descubre arte, lugares y experiencias.</small>
        </div>
      </button>

      <button class="half guest" (click)="continueAsGuest()">
        <div class="label">
          <strong>INVITADO</strong>
          <small>Explora Quetzart sin crear cuenta.</small>
        </div>
      </button>
    </div>
  </div>
</ion-content>
