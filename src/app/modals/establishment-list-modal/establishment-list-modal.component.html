<ion-header class="qz-header">
  <ion-toolbar class="qz-header">
    <ion-title>Establecimientos</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="qz-bg">
    <main class="entity-list">
      <div class="search-wrap">
        <ion-searchbar
          class="qz-input"
          placeholder="Buscar por nombre, categoria o municipio"
          [value]="search"
          debounce="250"
          (ionInput)="onSearchChange($event)">
        </ion-searchbar>
      </div>

      <div class="state" *ngIf="loading">Cargando establecimientos...</div>
      <div class="state" *ngIf="!loading && !items.length">No se encontraron establecimientos.</div>

      <section class="results" *ngIf="items.length">
        <div class="result-meta">
          <strong>Resultados</strong>
          <span>{{ items.length }} / {{ total }}</span>
        </div>

        <button
          type="button"
          *ngFor="let e of items; trackBy: trackById"
          class="entity-row"
          (click)="openEstablishment(e)">
          <img [src]="e.profile_image_url || 'assets/avatar-placeholder.png'" [alt]="e.display_name || 'Establecimiento'" />

          <div class="entity-copy">
            <strong>{{ e.display_name }}</strong>
            <span>{{ e.category || 'Sin categoria' }}</span>
            <p>{{ e.municipality || 'Municipio sin definir' }}</p>
          </div>

          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </section>

      <ion-infinite-scroll threshold="120px" (ionInfinite)="loadMore($event)" [disabled]="ended || loading">
        <ion-infinite-scroll-content loadingText="Cargando mas..."></ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </main>
  </div>
</ion-content>
