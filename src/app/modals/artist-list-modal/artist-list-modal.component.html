<ion-header class="qz-header">
  <ion-toolbar class="qz-header">
    <ion-title>Artistas</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="qz-bg">
    <main class="artist-list">
      <div class="search-wrap">
        <ion-searchbar
          class="qz-input"
          placeholder="Buscar por nombre o estilo"
          [value]="search"
          debounce="250"
          (ionInput)="onSearchChange($event)">
        </ion-searchbar>
      </div>

      <div class="state" *ngIf="loading">Cargando artistas...</div>
      <div class="state" *ngIf="!loading && !items.length">No se encontraron artistas.</div>

      <section class="results" *ngIf="items.length">
        <div class="result-meta">
          <strong>Resultados</strong>
          <span>{{ items.length }} / {{ total }}</span>
        </div>

        <button
          type="button"
          *ngFor="let a of items; trackBy: trackById"
          class="artist-row"
          (click)="openArtist(a)">
          <img [src]="a.profile_image_url || 'assets/avatar-placeholder.png'" [alt]="a.display_name || 'Artista'" />

          <div class="artist-copy">
            <strong>{{ a.display_name }}</strong>
            <span>{{ a.artistic_style || 'Sin estilo' }}</span>
            <p *ngIf="a.bio">{{ a.bio }}</p>
          </div>

          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </section>

      <ion-infinite-scroll threshold="120px" (ionInfinite)="loadMore($event)" [disabled]="ended || loading">
        <ion-infinite-scroll-content loadingText="Cargando mas..."></ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </main>
  </div>
</ion-content>
