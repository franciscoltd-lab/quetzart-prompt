<ion-app>
  <main *ngIf="updateRequired; else appReady" class="version-blocker">
    <section>
      <p class="version-kicker">Actualizacion requerida</p>
      <h1>Tienes una version anterior</h1>
      <p>
        Debes actualizar Quetzart para poder entrar a la app.
      </p>
      <small>
        Version instalada: {{ currentVersion }} - Version minima: {{ minimumVersion }}
      </small>
      <ion-button class="update-cta" [href]="updateUrl" target="_blank" rel="noopener noreferrer">
        Actualizar en {{ updateStoreName }}
      </ion-button>
    </section>
  </main>

  <ng-template #appReady>
    <ion-router-outlet></ion-router-outlet>
  </ng-template>
</ion-app>
